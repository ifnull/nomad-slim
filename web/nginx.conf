worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  types {
    application/vnd.pmtiles pmtiles;
  }

  # Browsers require a secure context (HTTPS) to grant geolocation, so the
  # maps page's "locate me" button only works when accessed over :8443.
  # Plain HTTP on :8080 is kept so localhost/LAN access without CA install
  # still works for everything that doesn't need geolocation.
  server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # JSON directory listing for /maps/ so the viewer can discover
    # .pmtiles files that the user drops into ./data/maps.
    location /maps/ {
      autoindex on;
      autoindex_format json;
      autoindex_exact_size on;
      add_header Cache-Control "no-cache";
    }

    # Serve .pmtiles with range-request support (nginx default) and a
    # long cache; MapLibre's PMTiles protocol makes many range requests.
    location ~* \.pmtiles$ {
      root /usr/share/nginx/html;
      add_header Cache-Control "public, max-age=86400";
      add_header Access-Control-Allow-Origin "*";
    }

    # Font glyph packs (PBF) + sprite sheets for labeled basemap rendering.
    # Populated by scripts/fetch-basemap-assets.sh.
    location /basemaps-assets/ {
      add_header Cache-Control "public, max-age=2592000";
      add_header Access-Control-Allow-Origin "*";
      try_files $uri =404;
    }

    # Make the root CA downloadable so phones can grab it to install.
    # Only present if scripts/generate-cert.sh has been run on the host.
    location = /ca.crt {
      alias /etc/nginx/certs/ca.crt;
      default_type application/x-x509-ca-cert;
      add_header Content-Disposition 'attachment; filename="nomad-slim-ca.crt"';
      try_files $uri =404;
    }
  }
}
