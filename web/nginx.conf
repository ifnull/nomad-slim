worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  types {
    application/vnd.pmtiles pmtiles;
  }

  server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # JSON directory listing for /maps/ so the viewer can discover
    # .pmtiles files that the user drops into ./data/maps.
    location /maps/ {
      autoindex on;
      autoindex_format json;
      autoindex_exact_size on;
      add_header Cache-Control "no-cache";
    }

    # Serve .pmtiles with range-request support (nginx default) and a
    # long cache; MapLibre's PMTiles protocol makes many range requests.
    location ~* \.pmtiles$ {
      root /usr/share/nginx/html;
      add_header Cache-Control "public, max-age=86400";
      add_header Access-Control-Allow-Origin "*";
    }
  }
}
